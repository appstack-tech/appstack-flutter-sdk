name: Integration

# Integration tests build and launch the sample app on a real simulator/emulator
# and exercise the native bridge. The iOS job runs the SAME suite twice — once
# per integration path (SwiftPM and CocoaPods/XCFramework) — so a link failure on
# either path fails CI. See sample_app/integration_test/README.md.
#
# These are heavier than the unit-test workflow (macOS runners, simulators), so
# they run on PRs into main and on demand rather than on every push.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Least privilege: this workflow only reads the repo and runs tests — it never
# pushes, comments, or publishes.
permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.1'
  # Optional: set an org secret APPSTACK_API_KEY to also validate delivery.
  APPSTACK_API_KEY: ${{ secrets.APPSTACK_API_KEY }}

jobs:
  ios:
    name: iOS (${{ matrix.integration }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        # Both must build, link and pass — this is the SPM-vs-CocoaPods guard.
        integration: [spm, cocoapods]
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Select iOS integration path
        run: |
          if [ "${{ matrix.integration }}" = "spm" ]; then
            flutter config --enable-swift-package-manager
          else
            flutter config --no-enable-swift-package-manager
          fi

      - name: Install dependencies
        run: flutter pub get
        working-directory: sample_app

      - name: Pod install (CocoaPods path only)
        if: matrix.integration == 'cocoapods'
        run: pod install
        working-directory: sample_app/ios

      - name: Boot an iOS simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json;d=json.load(sys.stdin)['devices'];print(next(x['udid'] for v in d.values() for x in v if 'iPhone' in x['name']))")
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Start capturing Appstack SDK logs
        run: |
          xcrun simctl spawn "$DEVICE_ID" log stream --level debug \
            --predicate 'subsystem == "tech.app-stack.appstack"' \
            > "$RUNNER_TEMP/appstack-ios.log" 2>&1 &
          echo "APPSTACK_LOG_PID=$!" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: |
          flutter test integration_test \
            --dart-define=APPSTACK_API_KEY="${APPSTACK_API_KEY:-integration-test-placeholder-key}" \
            -d "$DEVICE_ID"
        working-directory: sample_app

      # Surface the native SDK's own log lines — event POSTs, HTTP status codes,
      # attribution — so automatic runs *show* the events. Delivery only happens
      # when a real APPSTACK_API_KEY secret is set; otherwise the SDK reports
      # itself disabled and there is nothing to send.
      - name: Show captured Appstack SDK logs
        if: always()
        run: |
          kill "$APPSTACK_LOG_PID" 2>/dev/null || true
          echo "::group::Appstack SDK / event traffic (iOS ${{ matrix.integration }})"
          grep -iE "appstack|/ios/|event|status code|20[0-9]" "$RUNNER_TEMP/appstack-ios.log" \
            || echo "(no Appstack SDK log lines captured — is APPSTACK_API_KEY set?)"
          echo "::endgroup::"

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2.23.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: sample_app

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 30
          arch: x86_64
          working-directory: sample_app
          # android-emulator-runner executes `script` one line at a time, so the
          # logcat-capture + test + log-surfacing logic lives in a single script
          # file (see sample_app/tool/ci_android_integration.sh) to keep shell
          # state intact.
          script: bash tool/ci_android_integration.sh
