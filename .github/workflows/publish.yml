name: Publish to pub.dev

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read
  id-token: write

# Single source of truth for version validation, reused by every job below so
# the publish gate and the release defense-in-depth check stay identical.
# Restricted SemVer: MAJOR.MINOR.PATCH with an optional, well-formed prerelease
# (dot-separated, non-empty [0-9A-Za-z-] identifiers — rejects empty identifiers
# and consecutive dots).
env:
  SEMVER_REGEX: '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    # Least privilege: publishing only reads the repo. Creating the GitHub
    # Release (which needs contents: write) is isolated in the `release` job.
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v1
        with:
          sdk: stable
          version: 3.44.1

      - name: Extract version from tag
        id: get_version
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/}
          # Validate the tag is a simple SemVer before it flows into any script
          # or downstream job — guards against script injection via crafted tags.
          if ! printf '%s' "$VERSION" | grep -Eq "$SEMVER_REGEX"; then
            echo "::error::Tag '$VERSION' is not a valid SemVer version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Install dependencies
        run: flutter pub get
        working-directory: appstack_plugin

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up pub.dev credentials
        run: |
          gcloud auth print-identity-token --audiences=https://pub.dev | flutter pub token add https://pub.dev

      # Enforce version changes in all files, just in case we missed to change some
      - name: Update version in files
        env:
          # Pass the validated output through env rather than interpolating it
          # directly into the script body.
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          echo "Updating version to $VERSION"

          # Update pubspec.yaml files
          sed -i "s/^version: .*/version: $VERSION/" appstack_plugin/pubspec.yaml

          # Update podspec files
          sed -i "s/s\.version.*=.*/s.version          = '$VERSION'/" appstack_plugin/ios/appstack_plugin.podspec

          # Update build.gradle files
          sed -i "s/^version .*/version '$VERSION'/" appstack_plugin/android/build.gradle

          # Update wrapper version constant
          sed -i "s/const _kWrapperVersion = 'flutter-[^']*'/const _kWrapperVersion = 'flutter-$VERSION'/" appstack_plugin/lib/appstack_plugin_method_channel.dart

          # Update documentation files
          sed -i "s/appstack_plugin: \^[0-9]\+\.[0-9]\+\.[0-9]\+/appstack_plugin: ^$VERSION/" appstack_plugin/README.md
          sed -i "s/appstack_plugin: \^[0-9]\+\.[0-9]\+\.[0-9]\+/appstack_plugin: ^$VERSION/" appstack_plugin/USAGE.md
          sed -i "s/appstack_plugin: \^[0-9]\+\.[0-9]\+\.[0-9]\+/appstack_plugin: ^$VERSION/" README.md

          echo "Version updated in all files"

      # Dry-run AFTER the version bump so it validates the exact package contents
      # (including the updated pubspec.yaml version) that the next step publishes.
      - name: Publish - dry run
        run: flutter pub publish --dry-run
        working-directory: appstack_plugin

      - name: Publish to pub.dev
        run: flutter pub publish -f
        working-directory: appstack_plugin

  # Create a GitHub Release so the changes for each version are visible on the
  # repo's Releases page and users can see the current latest version. Notes are
  # pulled from the matching CHANGELOG section. Runs only after the publish job
  # succeeds (needs: publish), and is the only job granted contents: write.
  #
  # Skipped for pre-release tags (anything with a "-", e.g. 2.4.0-rc1): those
  # still publish to pub.dev but do not get a GitHub Release.
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ !contains(needs.publish.outputs.version, '-') }}
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Consume the version as an env value, not inline interpolation.
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail

          # Defense in depth: publish already validated this with the same
          # SEMVER_REGEX, but re-check before it flows into git/gh commands.
          # Stable-only is enforced by the job `if:` above, not this regex.
          if ! printf '%s' "$VERSION" | grep -Eq "$SEMVER_REGEX"; then
            echo "::error::Refusing to release invalid version '$VERSION'"
            exit 1
          fi

          # Idempotent: skip if a release for this version already exists (e.g. a
          # workflow re-run) instead of failing on `gh release create`.
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — skipping."
            exit 0
          fi

          # Extract this version's section from the CHANGELOG: everything between
          # "## [VERSION]" and the next "## [" header.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' appstack_plugin/CHANGELOG.md)

          # Trim leading/trailing blank lines (portable — no tac).
          NOTES=$(printf '%s\n' "$NOTES" \
            | sed '/./,$!d' \
            | awk 'NF{last=NR} {line[NR]=$0} END{for (i=1; i<=last; i++) print line[i]}')

          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION. See appstack_plugin/CHANGELOG.md for details."
          fi

          printf '%s\n' "$NOTES" > "$RUNNER_TEMP/release_notes.md"
          echo "----- release notes for $VERSION -----"
          cat "$RUNNER_TEMP/release_notes.md"

          # Only stable X.Y.Z tags reach this job (see the job's `if:`), so the
          # release is always marked latest.
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file "$RUNNER_TEMP/release_notes.md" \
            --verify-tag \
            --latest
